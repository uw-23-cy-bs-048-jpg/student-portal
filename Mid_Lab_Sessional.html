<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fb;
    font-family: 'Segoe UI', sans-serif;
}
.page { display: none; }
.active { display: block; }

.card-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.btn-main {
    background: #4e73df;
    color: white;
    border-radius: 8px;
}
.btn-main:hover { background: #375ac2; }

input, textarea, select {
    border-radius: 8px !important;
}
</style>
</head>

<body class="container mt-4">

<nav class="navbar bg-white shadow-sm mb-4 px-3">
    <span class="fw-bold text-primary">🎓 Student Portal</span>
    <div class="ms-auto">
        <button class="btn btn-outline-primary btn-sm" onclick="showPage('home')">Home</button>
        <button class="btn btn-outline-primary btn-sm" onclick="showPage('register')">Register</button>
        <button class="btn btn-outline-primary btn-sm" onclick="showPage('dashboard')">Dashboard</button>
        <button class="btn btn-outline-primary btn-sm" onclick="showPage('courses')">Courses</button>
        <button class="btn btn-outline-primary btn-sm" onclick="showPage('feedback')">Feedback</button>
    </div>
</nav>

<div id="home" class="page active">
    <div class="card-box text-center">
        <h3>Welcome Aibad Jhangir</h3>
        <p class="text-muted">Simple Student Web Portal</p>
    </div>
</div>

<div id="register" class="page">
<div class="card-box">
<h4>Registration</h4>

<form onsubmit="return validateForm()">
<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input type="password" id="pass" class="form-control mb-2" placeholder="Password">
<input type="password" id="confirm" class="form-control mb-2" placeholder="Confirm Password">
<input id="age" class="form-control mb-2" placeholder="Age">

<select id="gender" class="form-control mb-3">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<button class="btn btn-main w-100">Register</button>
</form>
</div>
</div>

<div id="dashboard" class="page">
<div class="card-box text-center">
<h4 id="welcome"></h4>
<button class="btn btn-main mb-2" onclick="showTime()">Show Time</button>
<p id="time" class="text-muted"></p>
</div>
</div>

<div id="courses" class="page">
<div class="card-box">
<h4>Courses</h4>

<label><input type="checkbox" value="Web Dev"> Web Development</label><br>
<label><input type="checkbox" value="AI"> Artificial Intelligence</label><br>
<label><input type="checkbox" value="DB"> Database Systems</label><br>
<label><input type="checkbox" value="Mobile"> Mobile App Development</label><br><br>

<button class="btn btn-main" onclick="submitCourses()">Submit</button>
</div>
</div>

<div id="feedback" class="page">
<div class="card-box">
<h4>Feedback</h4>

<input id="fname" class="form-control mb-2" placeholder="Name">
<textarea id="comment" class="form-control mb-2" placeholder="Comments"></textarea>

<select id="rating" class="form-control mb-3">
<option value="">Rating</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
</select>

<button class="btn btn-main" onclick="submitFeedback()">Submit</button>
</div>
</div>

<script>

function showPage(p) {
    document.querySelectorAll(".page").forEach(x => x.classList.remove("active"));
    document.getElementById(p).classList.add("active");
}

function validateForm() {
    let n = name.value, e = email.value, p = pass.value, c = confirm.value, a = age.value;

    if (!n || !e || !p || !c || !a) return alert("Fill all fields"), false;
    if (!e.includes("@")) return alert("Invalid email"), false;
    if (p !== c) return alert("Passwords not match"), false;
    if (isNaN(a)) return alert("Age must be number"), false;

    welcome.innerText = "Welcome, " + n;
    showPage("dashboard");
    return false;
}

function showTime() {
    time.innerText = new Date().toLocaleString();
}

function submitCourses() {
    let s = [...document.querySelectorAll("#courses input:checked")].map(x => x.value);
    if (!s.length) return alert("Select course");
    alert("Selected: " + s.join(", "));
}

function submitFeedback() {
    if (!fname.value || !comment.value) return alert("Fill all fields");
    alert("Feedback submitted!");
}

</script>

</body>
</html>
